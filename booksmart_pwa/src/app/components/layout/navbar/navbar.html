<nav class="nav-wrapper">
    <div class="brand">
      <span class="brand-logo-shell">
        <img src="assets/img/booksmartlogo.png" alt="Booksmart" class="brand-logo">
      </span>
      <span class="brand-text">Booksmart</span>
    </div>

    <div class="nav-links">
      <a
        routerLink="/app/home"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item">
        Inicio
      </a>
      <a
        routerLink="/app/services"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item">
        Servicios
      </a>
      <a
        routerLink="/app/agendas"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item">
        Agendas
      </a>
      <a
        routerLink="/app/profile"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item">
        Perfil
      </a>
      <button
        class="theme-btn"
        type="button"
        [class.active]="isDarkTheme()"
        (click)="toggleTheme()">
        Tema
      </button>
      <button class="logout-btn" type="button" (click)="requestLogout()">
        Salir
      </button>
    </div>
  </nav>

  <app-confirm-modal
    [show]="showLogoutConfirmModal"
    [title]="'Cerrar sesión'"
    [message]="'¿Seguro que deseas cerrar sesión ahora?'"
    [confirmText]="'Sí, salir'"
    [cancelText]="'Cancelar'"
    (confirm)="confirmLogout()"
    (cancel)="cancelLogout()">
  </app-confirm-modal>

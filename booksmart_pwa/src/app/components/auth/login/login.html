<div class="auth-container">
  <div class="auth-card">
    <div class="logo-container">
      <span class="logo-shell">
        <img src="assets/img/booksmartlogo.png" alt="Booksmart Logo" class="logo">
      </span>
    </div>
    
    <h1>Booksmart</h1>
    <h2>Iniciar Sesión</h2>
    
    <app-alert 
      [message]="errorMessage" 
      [type]="'error'" 
      [show]="!!errorMessage">
    </app-alert>
    
    <form (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input 
          type="email" 
          id="email" 
          [(ngModel)]="email" 
          name="email"
          placeholder="tu@email.com"
          [disabled]="isLoading"
          required
        >
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          [disabled]="isLoading"
          required
        >
      </div>

      <button type="submit" class="btn-primary" [disabled]="isLoading">
        {{ isLoading ? 'Iniciando sesión...' : 'Entrar' }}
      </button>
    </form>

    <div class="demo-section">
      <div class="demo-divider">
        <span>o</span>
      </div>
  
      <button
        type="button"
        class="btn-demo"
        [disabled]="isLoading || isDemoLoading"
        (click)="onDemoAccess()">
        <i class="bi bi-play-circle"></i>
        {{ isDemoLoading ? 'Entrando al demo...' : 'Probar Demo Interactivo' }}
      </button>
      <p class="demo-hint">Explora la app con datos de ejemplo y un tour guiado</p>
    </div>

    <p class="auth-link">
      ¿No tienes cuenta? <a routerLink="/register">Regístrate</a>
    </p>
  </div>
</div>

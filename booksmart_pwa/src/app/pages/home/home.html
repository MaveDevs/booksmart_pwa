<div class="dashboard-container">
    <header class="dashboard-header">
      <h1>Agenda de Citas</h1>
      <p>Gestiona tus citas de manera eficiente.</p>
    </header>
  
    <section class="dashboard-filters">
      <h2>Filtros</h2>
      <div class="filters-grid">
        <label>
          Fecha:
          <input type="date" class="filter-input" />
        </label>
        <label>
          Servicio:
          <select class="filter-input">
            <option value="">Todos</option>
            <option value="barberia">Barbería</option>
            <option value="estetica">Estética</option>
            <option value="unas">Uñas Acrílicas</option>
            <option value="faciales">Faciales</option>
          </select>
        </label>
        <label>
          Estado:
          <select class="filter-input">
            <option value="">Todos</option>
            <option value="pendiente">Pendiente</option>
            <option value="confirmada">Confirmada</option>
            <option value="cancelada">Cancelada</option>
          </select>
        </label>
      </div>
      <button class="btn-primary">Aplicar Filtros</button>
    </section>
  
    <section class="dashboard-agenda">
      <h2>Citas Programadas</h2>
      <div class="agenda-table">
        <div class="agenda-header">
          <span>Hora</span>
          <span>Cliente</span>
          <span>Servicio</span>
          <span>Estado</span>
        </div>
        <div class="agenda-row">
          <span>10:00 AM</span>
          <span>Juan Pérez</span>
          <span>Barbería</span>
          <span>Pendiente</span>
        </div>
        <div class="agenda-row">
          <span>11:30 AM</span>
          <span>María López</span>
          <span>Facial</span>
          <span>Confirmada</span>
        </div>
        <div class="agenda-row">
          <span>01:00 PM</span>
          <span>Carlos García</span>
          <span>Uñas Acrílicas</span>
          <span>Cancelada</span>
        </div>
      </div>
    </section>
  
    <footer class="dashboard-footer">
      <p>&copy; 2026 Booksmart. Todos los derechos reservados.</p>
    </footer>
  </div>

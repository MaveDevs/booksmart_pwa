<div class="setup-container">
  <div class="setup-content">

    <!-- Visual hero -->
    <div class="setup-hero">
      <div class="hero-icon">🏪</div>
      <h1>¡Bienvenido a Booksmart!</h1>
      <p>Configura tu negocio en segundos y empieza a recibir citas de tus clientes.</p>
    </div>

    <app-alert
      [message]="errorMessage"
      [type]="'error'"
      [show]="!!errorMessage">
    </app-alert>

    <!-- Stepper card -->
    <div class="setup-card">
      <div class="step-indicator">
        <span class="step active">1</span>
        <span class="step-line"></span>
        <span class="step">2</span>
        <span class="step-line"></span>
        <span class="step">3</span>
      </div>
      <h2>Datos básicos del negocio</h2>

      <form (ngSubmit)="onSubmit()">
        <div class="form-row">
          <div class="form-group">
            <label for="nombre">Nombre del negocio <span class="required">*</span></label>
            <input
              type="text"
              id="nombre"
              [(ngModel)]="nombre"
              name="nombre"
              placeholder="Ej. Barbería El Estilo"
              [disabled]="isLoading"
              required
            >
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="descripcion">Descripción</label>
            <textarea
              id="descripcion"
              [(ngModel)]="descripcion"
              name="descripcion"
              placeholder="¿Qué ofrece tu negocio? Cuéntale a tus futuros clientes..."
              [disabled]="isLoading"
              rows="3"
            ></textarea>
          </div>
        </div>

        <div class="form-row double">
          <div class="form-group">
            <label for="direccion">📍 Dirección</label>
            <input
              type="text"
              id="direccion"
              [(ngModel)]="direccion"
              name="direccion"
              placeholder="Calle, número, colonia..."
              [disabled]="isLoading"
            >
          </div>
          <div class="form-group">
            <label for="telefono">📞 Teléfono</label>
            <input
              type="tel"
              id="telefono"
              [(ngModel)]="telefono"
              name="telefono"
              placeholder="(614) 123-4567"
              [disabled]="isLoading"
            >
          </div>
        </div>

        <button type="submit" class="btn-primary" [disabled]="isLoading">
          {{ isLoading ? 'Creando tu negocio...' : 'Continuar →' }}
        </button>
      </form>
    </div>

    <p class="setup-footer">
      <button type="button" class="btn-link" (click)="onLogout()">Cerrar sesión</button>
    </p>
  </div>
</div>
